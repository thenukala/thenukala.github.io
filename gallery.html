<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery – Nukala Family Tree</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="icon" href="favicon.ico"/>
  <link rel="apple-touch-icon" href="icons/icon-192x192.png"/>
  <style>
    .filter-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:36px; }
    .filter-btn { padding:8px 18px; border-radius:20px; border:1.5px solid var(--border); background:white; font-family:'Jost',sans-serif; font-size:.78rem; font-weight:500; letter-spacing:.08em; color:var(--text-mid); cursor:pointer; transition:all .2s; }
    .filter-btn:hover,.filter-btn.active { background:var(--sage-dark); color:white; border-color:var(--sage-dark); }

    .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
    .gallery-card { background:var(--warm-white); border:1px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; transition:box-shadow .2s, transform .2s; }
    .gallery-card:hover { box-shadow:0 8px 28px rgba(0,0,0,.1); transform:translateY(-3px); }
    .gallery-img { width:100%; height:200px; object-fit:cover; display:block; }
    .gallery-placeholder { width:100%; height:200px; background:linear-gradient(135deg,var(--sage-light),var(--gold-light)); display:flex; align-items:center; justify-content:center; font-size:48px; }
    .gallery-card-body { padding:16px 18px; }
    .gallery-card-title { font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-weight:600; color:var(--text-dark); margin-bottom:4px; }
    .gallery-card-meta { font-size:.75rem; color:var(--text-light); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .gallery-tag { display:inline-block; background:var(--sage-light); color:var(--sage-dark); font-size:.65rem; font-weight:500; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:20px; }

    .empty-gallery { text-align:center; padding:80px 20px; color:var(--text-light); }
    .empty-gallery .ei { font-size:56px; margin-bottom:16px; }
    .empty-gallery p { font-size:.88rem; line-height:1.7; }

    /* Lightbox */
    .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(6px); padding:20px; }
    .lightbox.open { display:flex; }
    .lb-content { background:white; border-radius:20px; max-width:640px; width:100%; overflow:hidden; animation:fadeUp .3s ease; position:relative; }
    .lb-img { width:100%; max-height:400px; object-fit:cover; display:block; }
    .lb-placeholder { width:100%; height:280px; background:linear-gradient(135deg,var(--sage-light),var(--gold-light)); display:flex; align-items:center; justify-content:center; font-size:72px; }
    .lb-body { padding:24px 28px; }
    .lb-title { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:400; margin-bottom:8px; }
    .lb-desc { font-size:.88rem; color:var(--text-mid); line-height:1.7; }
    .lb-close { position:absolute; top:14px; right:14px; background:rgba(0,0,0,.5); border:none; color:white; width:32px; height:32px; border-radius:50%; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <script src="auth.js"></script>
  <nav>
    <a class="nav-brand" href="home.html"><img src="logo.png" alt="Logo"/> <span class="nav-site-name" id="navSiteName">NUKALA</span></a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="tree.html">Family Tree</a></li>
      <li><a href="history.html">Our History</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="facts.html">Facts</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-logout" onclick="logout()">Sign Out</button>
  </nav>

  <main>
    <div class="page-hero">
      <p class="eyebrow">Memories</p>
      <h1>The <em>Nukala</em> Photo Gallery</h1>
      <div class="hero-divider"></div>
      <p>A visual archive of cherished moments, celebrations, and faces across the years.</p>
    </div>

    <div class="content-area">
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" onclick="filterGallery('all',this)">All Photos</button>
        <button class="filter-btn" onclick="filterGallery('family',this)">Family</button>
        <button class="filter-btn" onclick="filterGallery('vintage',this)">Vintage</button>
        <button class="filter-btn" onclick="filterGallery('celebrations',this)">Celebrations</button>
        <button class="filter-btn" onclick="filterGallery('travel',this)">Travel</button>
        <button class="filter-btn" onclick="filterGallery('other',this)">Other</button>
      </div>

      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lb-content">
      <button class="lb-close" onclick="closeLightbox()">✕</button>
      <div id="lbImgWrap"></div>
      <div class="lb-body">
        <div class="lb-title" id="lbTitle"></div>
        <div id="lbMeta" style="font-size:.72rem;color:var(--text-light);margin-bottom:8px;"></div>
        <div class="lb-desc" id="lbDesc"></div>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2024 <strong id="footerFamilyName">The Nukala Family</strong> · Private &amp; Password Protected · Made with 🌳 &amp; love
  </footer>

  <script>
    function loadArr(k){ return JSON.parse(localStorage.getItem(k)||'[]'); }
    function load(k){ return JSON.parse(localStorage.getItem(k)||'null'); }

    let allPhotos = [];
    let currentFilter = 'all';

    const catEmojis = { family:'👨‍👩‍👧‍👦', vintage:'📷', celebrations:'🎉', travel:'🌍', other:'🖼️' };

    function initGallery(){
      allPhotos = loadArr('nukala_gallery');
      const s = load('nukala_settings')||{};
      if(s.familyName) document.getElementById('footerFamilyName').textContent = 'The '+s.familyName+' Family';
      renderGallery();
    }

    function renderGallery(){
      const grid = document.getElementById('galleryGrid');
      const filtered = currentFilter==='all' ? allPhotos : allPhotos.filter(p=>p.cat===currentFilter);

      if(!filtered.length){
        grid.innerHTML = `<div class="empty-gallery" style="grid-column:1/-1;">
          <div class="ei">🖼️</div>
          <p>${allPhotos.length ? 'No photos in this category.' : 'No photos added yet.<br/>Go to <strong>Admin → Gallery</strong> to add your first family photo!'}</p>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map((p,i)=>`
        <div class="gallery-card fade-in" style="animation-delay:${i*0.05}s" onclick="openLightbox(${allPhotos.indexOf(p)})">
          ${p.url
            ? `<img class="gallery-img" src="${p.url}" alt="${p.title}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
               <div class="gallery-placeholder" style="display:none;">${catEmojis[p.cat]||'🖼️'}</div>`
            : `<div class="gallery-placeholder">${catEmojis[p.cat]||'🖼️'}</div>`}
          <div class="gallery-card-body">
            <div class="gallery-card-title">${p.title}</div>
            <div class="gallery-card-meta">
              <span class="gallery-tag">${p.cat||'general'}</span>
              ${p.year?`<span>${p.year}</span>`:''}
            </div>
            ${p.caption?`<div style="font-size:.75rem;color:var(--text-light);margin-top:6px;font-style:italic;">${p.caption}</div>`:''}
          </div>
        </div>`).join('');
    }

    function filterGallery(cat, btn){
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery();
    }

    function openLightbox(idx){
      const p = allPhotos[idx]; if(!p) return;
      document.getElementById('lbImgWrap').innerHTML = p.url
        ? `<img class="lb-img" src="${p.url}" alt="${p.title}" onerror="this.style.display='none';this.parentNode.innerHTML='<div class=\\'lb-placeholder\\'>${catEmojis[p.cat]||'🖼️'}</div>'"/>`
        : `<div class="lb-placeholder">${catEmojis[p.cat]||'🖼️'}</div>`;
      document.getElementById('lbTitle').textContent = p.title;
      document.getElementById('lbMeta').textContent = [p.cat, p.year].filter(Boolean).join(' · ');
      document.getElementById('lbDesc').textContent = p.caption||'';
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox(e){
      if(!e || e.target===document.getElementById('lightbox') || e.target.classList.contains('lb-close')){
        document.getElementById('lightbox').classList.remove('open');
      }
    }

    initGallery();
  </script>

<script>
// ── CMS Reader — reads all admin settings and applies to page ──
(function(){
  function load(k){ return JSON.parse(localStorage.getItem(k)||'null'); }

  // Apply theme colours
  const theme = load('nukala_theme');
  if(theme){
    const root = document.documentElement;
    if(theme.primary)   root.style.setProperty('--sage-dark', theme.primary);
    if(theme.secondary) root.style.setProperty('--sage', theme.secondary);
    if(theme.highlight) root.style.setProperty('--gold', theme.highlight);
    if(theme.bg)        root.style.setProperty('--cream', theme.bg);
    if(theme.text)      root.style.setProperty('--text-dark', theme.text);
    // Load custom fonts
    if(theme.fontHeading || theme.fontBody){
      const fonts = [theme.fontHeading, theme.fontBody].filter(Boolean).join('|').replace(/ /g,'+');
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${fonts.replace('|','&family=')}&display=swap`;
      document.head.appendChild(link);
      if(theme.fontHeading){
        document.querySelectorAll('.page-hero h1, h1, h2, .hero-title, .sec-title').forEach(el=>{
          el.style.fontFamily = theme.fontHeading+', serif';
        });
      }
      if(theme.fontBody){
        document.body.style.fontFamily = theme.fontBody+', sans-serif';
      }
    }
  }

  // Apply site wide settings
  const sw = load('nukala_sitewide');
  if(sw){
    // Nav site name
    document.querySelectorAll('.nav-site-name, #navSiteName').forEach(el=>{ if(sw.navName) el.textContent=sw.navName; });
    // Footer
    document.querySelectorAll('footer strong, #footerName, #footerFamilyName, #footerText').forEach(el=>{ if(sw.footer) el.textContent=sw.footer; });
    // Nav background
    const nav = document.querySelector('nav');
    if(nav && theme && theme.nav) nav.style.background = theme.nav;
  } else {
    // Fallback to home data for nav name
    const hd = load('nukala_home');
    if(hd && hd.navName){
      document.querySelectorAll('.nav-site-name, #navSiteName').forEach(el=>el.textContent=hd.navName);
    }
    const s = load('nukala_settings');
    if(s && s.familyName){
      document.querySelectorAll('#footerName,#footerFamilyName,#footerText').forEach(el=>el.textContent='The '+s.familyName+' Family');
    }
  }

  // Apply hero page settings
  const hero = load('nukala_heropage');
  if(hero && hero.homeImgUrl){
    const banner = document.querySelector('.hero-banner');
    if(banner){
      banner.style.backgroundImage = `url('${hero.homeImgUrl}')`;
      banner.style.backgroundSize = 'cover';
      banner.style.backgroundPosition = 'center';
      if(hero.homeTextClr) banner.style.color = hero.homeTextClr;
    }
  }

  // Apply gallery page settings
  const gp = load('nukala_gallerypage2');
  if(gp){
    const gtEl = document.getElementById('galPageTitle');
    const gdEl = document.getElementById('galPageDesc');
    if(gtEl && gp.title) gtEl.textContent = gp.title;
    if(gdEl && gp.desc) gdEl.textContent = gp.desc;
    // Dynamic filter buttons
    if(gp.cats && gp.cats.length){
      const filterBar = document.getElementById('filterBar');
      if(filterBar){
        filterBar.innerHTML = '<button class="filter-btn active" onclick="filterGallery(\'all\',this)">All Photos</button>' +
          gp.cats.map(c=>`<button class="filter-btn" onclick="filterGallery('${c}',this)">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join('');
      }
    }
  }

  // Apply contact page dropdown options
  const cp = load('nukala_contactpage2');
  if(cp && cp.dropdownOpts){
    const sel = document.getElementById('subject');
    if(sel){
      sel.innerHTML = '<option value="">— Select a reason —</option>' +
        cp.dropdownOpts.map(o=>`<option>${o}</option>`).join('');
    }
  }
  if(cp && cp.contactWays){
    const cw = document.getElementById('contactWays');
    if(cw){
      cw.innerHTML = cp.contactWays.map(w=>`
        <div class="contact-way">
          <div class="contact-way-icon">${w.icon}</div>
          <div><div class="contact-way-title">${w.title}</div><div class="contact-way-desc">${w.desc}</div></div>
        </div>`).join('');
    }
  }

  // Apply home page quick cards
  const hp2 = load('nukala_homepage2');
  if(hp2 && hp2.quickCards){
    const qn = document.getElementById('quickNavCards');
    if(qn){
      qn.innerHTML = hp2.quickCards.map(c=>`
        <a class="quick-card fade-in" href="${c.link}">
          <div class="quick-card-icon">${c.icon}</div>
          <div class="quick-card-title">${c.title}</div>
          <div class="quick-card-desc">${c.desc}</div>
          <div class="quick-card-arrow">${c.arrow}</div>
        </a>`).join('');
    }
  }

  // Apply updates section
  if(hp2 && hp2.updates && hp2.updates.length){
    const ul = document.getElementById('recentUpdatesList');
    if(ul && hp2.updates.length){
      ul.innerHTML = hp2.updates.map(u=>`
        <div class="update-item">
          <div class="update-dot"></div>
          <div><div class="update-title">${u.title}</div><div class="update-date">${u.date||''}</div></div>
        </div>`).join('');
    }
  }
})();
</script>

</body>
</html>
