<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Nukala Family</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="icon" href="favicon.ico"/>
  <link rel="stylesheet" href="darkmode.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--cream:#faf8f4;--white:#fff;--sage:#8aab8a;--sage-l:#c8ddc8;--sage-d:#5c7a5c;--gold:#c9a84c;--gold-l:#e8d5a0;--td:#2c2c2c;--tm:#6b6b6b;--tl:#a0a0a0;--border:#e8e2d8;--red:#c0614a;}
    body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--td);min-height:100vh;}
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(138,171,138,.12) 0%,transparent 60%),var(--cream);}
    .lcard{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 4px 40px rgba(0,0,0,.06);}
    .lcard img{width:72px;height:72px;object-fit:contain;border-radius:12px;display:block;margin:0 auto 10px;}
    .lcard h1{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:400;text-align:center;margin-bottom:4px;color:var(--td);}
    .lcard p{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--tl);text-align:center;margin-bottom:32px;}
    .lcard label{display:block;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tm);margin-bottom:7px;}
    .lcard input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Jost',sans-serif;font-size:.9rem;color:var(--td);background:var(--cream);outline:none;transition:border-color .2s;margin-bottom:6px;}
    .lcard input:focus{border-color:var(--sage);background:var(--white);}
    .lcard .err{color:var(--red);font-size:.78rem;margin-bottom:8px;display:none;text-align:center;padding:8px;background:#fdf0f0;border-radius:8px;}
    .lcard .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--sage-d),var(--sage));color:var(--white);border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:.85rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(92,122,92,.3);}
    .lcard .login-btn:hover{opacity:.9;}
    .lcard a{display:block;text-align:center;margin-top:14px;font-size:.74rem;color:var(--sage-d);text-decoration:none;}
    #adminUI{display:none;}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="lcard">
    <img src="logo.png" alt="Nukala"/>
    <h1>Admin Panel</h1>
    <p>Nukala Family · Full CMS</p>
    <label for="pwInput">Admin Password</label>
    <input type="password" id="pwInput" placeholder="Enter admin password" autocomplete="current-password"/>
    <div class="err" id="pwErr">❌ Incorrect password. Try: nukala_admin_2024</div>
    <button class="login-btn" id="loginBtn">Enter Admin Panel →</button>
    <a href="home.html">← Back to Website</a>
  </div>
</div>

<div id="adminUI">
  <p style="padding:40px;text-align:center;font-size:1rem;color:var(--tm);">Loading admin panel... <br/><br/><a href="home.html" style="color:var(--sage-d);">← Back to Website</a></p>
</div>

<script>
  // ── PASSWORDS ──
  var DEFAULT_PASS = 'nukala_admin_2024';
  function getAdminPass(){ return localStorage.getItem('nukala_admin_pass') || DEFAULT_PASS; }
  function getSitePass(){ return localStorage.getItem('nukala_site_pass') || 'nukala2024'; }

  // ── LOGIN ──
  function doLogin(){
    var pw = document.getElementById('pwInput').value;
    var err = document.getElementById('pwErr');
    if(pw === getAdminPass()){
      sessionStorage.setItem('nukala_admin','true');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminUI').style.display = 'block';
      loadAdminPanel();
    } else {
      err.style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  function doLogout(){
    sessionStorage.removeItem('nukala_admin');
    window.location.href = 'home.html';
  }

  // Attach events
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('pwInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') doLogin();
  });
  document.getElementById('pwInput').focus();

  // Auto-login if session active
  if(sessionStorage.getItem('nukala_admin') === 'true'){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminUI').style.display = 'block';
  }

  // ── LOAD ADMIN PANEL ──
  function loadAdminPanel(){
    var script = document.createElement('script');
    script.src = 'admin.js';
    script.onload = function(){ if(typeof initAdmin === 'function') initAdmin(); };
    script.onerror = function(){ document.getElementById('adminUI').innerHTML = '<p style="padding:40px;text-align:center;color:red;">⚠️ Could not load admin.js — make sure it is uploaded to GitHub!</p>'; };
    document.head.appendChild(script);
  }

  // Load admin panel JS if already logged in
  if(sessionStorage.getItem('nukala_admin') === 'true'){
    loadAdminPanel();
  }
</script>
</body>
</html>
