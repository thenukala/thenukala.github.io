<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Family Facts – Nukala Family</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="icon" href="favicon.ico"/>
  <link rel="apple-touch-icon" href="icons/icon-192x192.png"/>
  <style>
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; }
    .filter-btn { padding:7px 16px; border-radius:20px; border:1.5px solid var(--border); background:white; font-family:'Jost',sans-serif; font-size:.76rem; font-weight:500; letter-spacing:.06em; color:var(--text-mid); cursor:pointer; transition:all .2s; }
    .filter-btn:hover,.filter-btn.active { background:var(--sage-dark); color:white; border-color:var(--sage-dark); }

    .facts-list { display:flex; flex-direction:column; gap:14px; }

    .fact-item {
      background:white; border:1px solid var(--border); border-radius:14px;
      padding:20px 22px; display:flex; align-items:flex-start; gap:18px;
      transition:box-shadow .2s, border-color .2s, transform .2s;
      animation:fadeIn .5s ease forwards; opacity:0;
    }
    .fact-item:hover { box-shadow:0 4px 20px rgba(0,0,0,.06); border-color:var(--sage-light); transform:translateX(4px); }

    .fact-icon {
      width:48px; height:48px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:22px; flex-shrink:0;
      background:linear-gradient(135deg,var(--sage-light),rgba(138,171,138,.2));
    }
    .fact-icon.gold { background:linear-gradient(135deg,var(--gold-light),rgba(201,168,76,.2)); }
    .fact-icon.purple { background:linear-gradient(135deg,#f0e8f8,#e8d8f0); }
    .fact-icon.blue { background:linear-gradient(135deg,#e8f0f8,#d8e8f8); }
    .fact-icon.red { background:linear-gradient(135deg,#fde8e8,#f8d8d8); }

    .fact-body { flex:1; }
    .fact-title { font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:600; color:var(--text-dark); margin-bottom:4px; line-height:1.3; }
    .fact-desc { font-size:.84rem; color:var(--text-mid); line-height:1.7; font-weight:300; }
    .fact-meta { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
    .fact-tag { font-size:.62rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:20px; }
    .fact-tag-achievement { background:rgba(92,122,92,.1); color:var(--sage-dark); }
    .fact-tag-milestone { background:var(--gold-light); color:#8a6a00; }
    .fact-tag-tradition { background:#f0e8f8; color:#7050a0; }
    .fact-tag-record { background:#e8f0f8; color:#305080; }
    .fact-tag-fun { background:#fde8e8; color:#a03030; }
    .fact-tag-other { background:var(--cream); color:var(--text-mid); }

    .fact-person { font-size:.72rem; color:var(--text-light); font-style:italic; }
    .fact-year { font-size:.72rem; color:var(--text-light); }

    .empty-facts { text-align:center; padding:80px 20px; color:var(--text-light); }
    .empty-facts .ei { font-size:52px; margin-bottom:16px; }
    .empty-facts p { font-size:.86rem; line-height:1.7; }

    .facts-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
    .facts-count { font-size:.78rem; color:var(--text-light); font-weight:500; }

    @keyframes fadeIn { to { opacity:1; } }
    .stagger-1{animation-delay:.05s} .stagger-2{animation-delay:.1s} .stagger-3{animation-delay:.15s}
    .stagger-4{animation-delay:.2s}  .stagger-5{animation-delay:.25s} .stagger-6{animation-delay:.3s}
  </style>
</head>
<body>
  <script src="auth.js"></script>
  <nav>
    <a class="nav-brand" href="home.html">
      <img src="logo.png" alt="Logo"/>
      <span class="nav-site-name" id="navSiteName">NUKALA</span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="tree.html">Family Tree</a></li>
      <li><a href="history.html">Our History</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="facts.html" class="active">Facts</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-logout" onclick="logout()">Sign Out</button>
  </nav>

  <main>
    <div class="page-hero">
      <p class="eyebrow">Did You Know?</p>
      <h1>Interesting <em>Family Facts</em></h1>
      <div class="hero-divider"></div>
      <p>Fascinating milestones, achievements, traditions and firsts from across the Nukala family.</p>
    </div>

    <div class="content-area">
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" onclick="filterFacts('all',this)">🌟 All Facts</button>
        <button class="filter-btn" onclick="filterFacts('Achievement',this)">🏆 Achievements</button>
        <button class="filter-btn" onclick="filterFacts('Milestone',this)">⭐ Milestones</button>
        <button class="filter-btn" onclick="filterFacts('Tradition',this)">🎭 Traditions</button>
        <button class="filter-btn" onclick="filterFacts('Record',this)">📊 Records</button>
        <button class="filter-btn" onclick="filterFacts('Fun Fact',this)">😄 Fun Facts</button>
        <button class="filter-btn" onclick="filterFacts('Other',this)">📌 Other</button>
      </div>

      <div class="facts-header">
        <span class="facts-count" id="factsCount"></span>
      </div>

      <div class="facts-list" id="factsList"></div>
    </div>
  </main>

  <footer>
    &copy; 2024 <strong id="footerName">The Nukala Family</strong> · Private &amp; Password Protected · Made with 🌳 &amp; love
  </footer>

  <script>
    function loadArr(k){ return JSON.parse(localStorage.getItem(k)||'[]'); }
    function load(k){ return JSON.parse(localStorage.getItem(k)||'null'); }

    let allFacts=[], currentFilter='all';

    const tagClasses = {
      'Achievement':'fact-tag-achievement','Milestone':'fact-tag-milestone',
      'Tradition':'fact-tag-tradition','Record':'fact-tag-record',
      'Fun Fact':'fact-tag-fun','Other':'fact-tag-other'
    };
    const iconBgs = {
      'Achievement':'gold','Milestone':'','Tradition':'purple',
      'Record':'blue','Fun Fact':'red','Other':''
    };
    const tagEmojis = {
      'Achievement':'🏆','Milestone':'⭐','Tradition':'🎭',
      'Record':'📊','Fun Fact':'😄','Other':'📌'
    };

    function initFacts(){
      const s = load('nukala_settings')||{};
      if(s.familyName){
        document.getElementById('navSiteName').textContent = s.familyName.toUpperCase();
        document.getElementById('footerName').textContent = 'The '+s.familyName+' Family';
      }
      allFacts = loadArr('nukala_facts');
      renderFacts();
    }

    function renderFacts(){
      const list = document.getElementById('factsList');
      const filtered = currentFilter==='all' ? allFacts : allFacts.filter(f=>f.category===currentFilter);
      document.getElementById('factsCount').textContent = filtered.length + ' fact' + (filtered.length!==1?'s':'');

      if(!filtered.length){
        list.innerHTML=`<div class="empty-facts">
          <div class="ei">${currentFilter==='all'?'🌟':'🔍'}</div>
          <p>${allFacts.length?'No facts in this category yet.':'No facts added yet.<br/>Go to <strong>Admin → Facts</strong> to add your first family fact!'}</p>
        </div>`;
        return;
      }

      list.innerHTML = filtered.map((f,i)=>{
        const iconBg = iconBgs[f.category]||'';
        const emoji  = f.icon || tagEmojis[f.category]||'📌';
        const tagCls = tagClasses[f.category]||'fact-tag-other';
        return `<div class="fact-item stagger-${(i%6)+1}">
          <div class="fact-icon ${iconBg}">${emoji}</div>
          <div class="fact-body">
            <div class="fact-title">${f.title}</div>
            ${f.desc?`<div class="fact-desc">${f.desc}</div>`:''}
            <div class="fact-meta">
              <span class="fact-tag ${tagCls}">${f.category||'Other'}</span>
              ${f.person?`<span class="fact-person">👤 ${f.person}</span>`:''}
              ${f.year?`<span class="fact-year">📅 ${f.year}</span>`:''}
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function filterFacts(cat, btn){
      currentFilter=cat;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderFacts();
    }

    initFacts();
  </script>

<script>
// ── CMS Reader — reads all admin settings and applies to page ──
(function(){
  function load(k){ return JSON.parse(localStorage.getItem(k)||'null'); }

  // Apply theme colours
  const theme = load('nukala_theme');
  if(theme){
    const root = document.documentElement;
    if(theme.primary)   root.style.setProperty('--sage-dark', theme.primary);
    if(theme.secondary) root.style.setProperty('--sage', theme.secondary);
    if(theme.highlight) root.style.setProperty('--gold', theme.highlight);
    if(theme.bg)        root.style.setProperty('--cream', theme.bg);
    if(theme.text)      root.style.setProperty('--text-dark', theme.text);
    // Load custom fonts
    if(theme.fontHeading || theme.fontBody){
      const fonts = [theme.fontHeading, theme.fontBody].filter(Boolean).join('|').replace(/ /g,'+');
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${fonts.replace('|','&family=')}&display=swap`;
      document.head.appendChild(link);
      if(theme.fontHeading){
        document.querySelectorAll('.page-hero h1, h1, h2, .hero-title, .sec-title').forEach(el=>{
          el.style.fontFamily = theme.fontHeading+', serif';
        });
      }
      if(theme.fontBody){
        document.body.style.fontFamily = theme.fontBody+', sans-serif';
      }
    }
  }

  // Apply site wide settings
  const sw = load('nukala_sitewide');
  if(sw){
    // Nav site name
    document.querySelectorAll('.nav-site-name, #navSiteName').forEach(el=>{ if(sw.navName) el.textContent=sw.navName; });
    // Footer
    document.querySelectorAll('footer strong, #footerName, #footerFamilyName, #footerText').forEach(el=>{ if(sw.footer) el.textContent=sw.footer; });
    // Nav background
    const nav = document.querySelector('nav');
    if(nav && theme && theme.nav) nav.style.background = theme.nav;
  } else {
    // Fallback to home data for nav name
    const hd = load('nukala_home');
    if(hd && hd.navName){
      document.querySelectorAll('.nav-site-name, #navSiteName').forEach(el=>el.textContent=hd.navName);
    }
    const s = load('nukala_settings');
    if(s && s.familyName){
      document.querySelectorAll('#footerName,#footerFamilyName,#footerText').forEach(el=>el.textContent='The '+s.familyName+' Family');
    }
  }

  // Apply hero page settings
  const hero = load('nukala_heropage');
  if(hero && hero.homeImgUrl){
    const banner = document.querySelector('.hero-banner');
    if(banner){
      banner.style.backgroundImage = `url('${hero.homeImgUrl}')`;
      banner.style.backgroundSize = 'cover';
      banner.style.backgroundPosition = 'center';
      if(hero.homeTextClr) banner.style.color = hero.homeTextClr;
    }
  }

  // Apply gallery page settings
  const gp = load('nukala_gallerypage2');
  if(gp){
    const gtEl = document.getElementById('galPageTitle');
    const gdEl = document.getElementById('galPageDesc');
    if(gtEl && gp.title) gtEl.textContent = gp.title;
    if(gdEl && gp.desc) gdEl.textContent = gp.desc;
    // Dynamic filter buttons
    if(gp.cats && gp.cats.length){
      const filterBar = document.getElementById('filterBar');
      if(filterBar){
        filterBar.innerHTML = '<button class="filter-btn active" onclick="filterGallery(\'all\',this)">All Photos</button>' +
          gp.cats.map(c=>`<button class="filter-btn" onclick="filterGallery('${c}',this)">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join('');
      }
    }
  }

  // Apply contact page dropdown options
  const cp = load('nukala_contactpage2');
  if(cp && cp.dropdownOpts){
    const sel = document.getElementById('subject');
    if(sel){
      sel.innerHTML = '<option value="">— Select a reason —</option>' +
        cp.dropdownOpts.map(o=>`<option>${o}</option>`).join('');
    }
  }
  if(cp && cp.contactWays){
    const cw = document.getElementById('contactWays');
    if(cw){
      cw.innerHTML = cp.contactWays.map(w=>`
        <div class="contact-way">
          <div class="contact-way-icon">${w.icon}</div>
          <div><div class="contact-way-title">${w.title}</div><div class="contact-way-desc">${w.desc}</div></div>
        </div>`).join('');
    }
  }

  // Apply home page quick cards
  const hp2 = load('nukala_homepage2');
  if(hp2 && hp2.quickCards){
    const qn = document.getElementById('quickNavCards');
    if(qn){
      qn.innerHTML = hp2.quickCards.map(c=>`
        <a class="quick-card fade-in" href="${c.link}">
          <div class="quick-card-icon">${c.icon}</div>
          <div class="quick-card-title">${c.title}</div>
          <div class="quick-card-desc">${c.desc}</div>
          <div class="quick-card-arrow">${c.arrow}</div>
        </a>`).join('');
    }
  }

  // Apply updates section
  if(hp2 && hp2.updates && hp2.updates.length){
    const ul = document.getElementById('recentUpdatesList');
    if(ul && hp2.updates.length){
      ul.innerHTML = hp2.updates.map(u=>`
        <div class="update-item">
          <div class="update-dot"></div>
          <div><div class="update-title">${u.title}</div><div class="update-date">${u.date||''}</div></div>
        </div>`).join('');
    }
  }
})();
</script>

</body>
</html>
